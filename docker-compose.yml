services:
  trajectiv-keycloak-db:
    image: postgres:16
    container_name: trajectiv-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    volumes:
      - trajectiv_keycloak_pg_data:/var/lib/postgresql/data
    networks:
      - trajectiv-network

  trajectiv-keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    container_name: trajectiv-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: trajectiv-keycloak-db
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"
    depends_on:
      - trajectiv-keycloak-db
    volumes:
      - ./docker/keycloak/realms:/opt/keycloak/data/import
      - ./docker/keycloak/providers:/opt/keycloak/providers
    networks:
      - trajectiv-network

volumes:
  trajectiv_keycloak_pg_data:

networks:
  trajectiv-network:
    driver: bridge
