<div class="app-background" aria-hidden="true"></div>
<div class="flex flex-col min-h-screen items-center justify-center z-10 relative">
  @if (loaderVisible()) {
    <div
      class="app-bootstrap-loader"
      [class.app-bootstrap-loader--leaving]="loaderCompleted()"
    >
      <lib-trajectiv-blob-loader
        [completed]="loaderCompleted()"
        size="8rem"
        label="Préparation de ta trajectoire..."
        (settled)="onLoaderSettled()"
      />
    </div>
  }
  <router-outlet />
</div>
