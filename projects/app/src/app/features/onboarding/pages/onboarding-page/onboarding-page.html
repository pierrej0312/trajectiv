<section
  class="onboarding-page"
  [class.onboarding-page--no-stage]="!onboarding.showCompanionStage()"
>
  @if (onboarding.showCompanionStage()) {
    <aside class="onboarding-page__stage">
      <app-companion-stage
        [config]="companionConfig()"
        [command]="onboarding.companionCommand()"
        [lightingPreset]="companionLightingPreset()"
      />
    </aside>
  }

  <div class="onboarding-page__flow">
    <main class="onboarding-page__content">
      <router-outlet />
    </main>

    @if (onboarding.errorMessage(); as error) {
      <p class="onboarding-page__error">
        {{ error }}
      </p>
    }

    @if (onboarding.showFooter()) {
      <footer class="onboarding-page__footer">
        <button
          pButton
          type="button"
          severity="secondary"
          class="onboarding-page__secondary"
          [disabled]="!onboarding.canGoPrevious() || onboarding.isSubmitting() || isAvatarBusy()"
          (click)="onboarding.goPrevious()"
        >
          <span class="pi pi-arrow-left" aria-hidden="true"></span>
          Retour
        </button>

        @if (isAvatarStep()) {
          <button
            pButton
            type="button"
            severity="secondary"
            class="onboarding-page__secondary"
            [disabled]="isAvatarBusy()"
            (click)="skipAvatarStep()"
          >
            <span class="pi pi-forward" aria-hidden="true"></span>
            Passer
          </button>

          <button
            pButton
            type="button"
            severity="secondary"
            class="onboarding-page__secondary"
            [disabled]="isAvatarBusy() ||
              onboarding.isCompletingOnboarding()"
            (click)="resetAvatarStep()"
          >
            @if (avatarStore.isDeleting()) {
              <span class="pi pi-spinner pi-spin" aria-hidden="true"></span>
              Réinitialisation...
            } @else {
              <span class="pi pi-refresh" aria-hidden="true"></span>
              Réinitialiser
            }
          </button>
        }

        @if (onboarding.isLastStep()) {
          <button
            pButton
            type="button"
            class="onboarding-page__submit"
            [disabled]="
              !onboarding.canComplete() ||
              onboarding.isSubmitting() ||
              onboarding.isCompletingOnboarding()"
            (click)="onboarding.complete()"
          >
            @if (onboarding.isSubmitting()) {
              <span class="pi pi-spinner pi-spin" aria-hidden="true"></span>
              Création...
            } @else {
              <span class="pi pi-sparkles" aria-hidden="true"></span>
              Lancer ma trajectoire
            }
          </button>
        } @else {
          <button
            pButton
            type="button"
            class="onboarding-page__submit"
            [disabled]="!canContinueCurrentStep()"
            (click)="continueCurrentStep()"
          >
            @if (isAvatarStep() && avatarStore.isSaving()) {
              <span class="pi pi-spinner pi-spin" aria-hidden="true"></span>
              Sauvegarde...
            } @else {
              Continuer
              <span class="pi pi-arrow-right" aria-hidden="true"></span>
            }
          </button>
        }
      </footer>
    }
  </div>

  @if (onboarding.isCompletionOverlayVisible()) {
    <app-onboarding-completion-overlay
      [phase]="onboarding.completionPhase()"
      [message]="onboarding.completionMessage()"
      [showRetry]="onboarding.showRetryInCompletionSuccess()"
      (retry)="onboarding.retryCompletion()"
      (closeError)="onboarding.closeCompletionError()"
    />
  }
</section>
