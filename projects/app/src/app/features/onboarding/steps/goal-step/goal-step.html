<header class="onboarding-page__header">
  <p class="onboarding-page__eyebrow">Objectif principal</p>
  <h1>Pourquoi veux-tu utiliser Trajectiv ?</h1>
  <p>Cette réponse nous aide à personnaliser ton accompagnement.</p>
</header>

<div class="onboarding-page__cards">
  @for (option of options; track option.value) {
    <button
      type="button"
      class="onboarding-card"
      [class.onboarding-card--selected]="onboarding.careerGoal() === option.value"
      (click)="onboarding.setCareerGoal(option.value)"
    >
      <strong>{{ option.label }}</strong>
      <span>{{ option.description }}</span>
    </button>
  }
</div>
